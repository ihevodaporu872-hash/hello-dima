<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расчёт инженерных систем — Жилой комплекс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0f1117;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.5;
        }

        .header {
            background: #161922;
            border-bottom: 1px solid #2a2d3a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: #3b82f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            font-weight: 700;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f0f0;
        }

        .header span {
            font-size: 0.75rem;
            color: #6b7280;
            margin-left: auto;
        }

        .nav {
            background: #161922;
            border-bottom: 1px solid #2a2d3a;
            padding: 6px 24px;
            display: flex;
            gap: 4px;
        }

        .nav a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.82rem;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav a:hover { color: #e0e0e0; background: #1e2130; }
        .nav a.active { color: #3b82f6; background: #1e2130; }

        .container {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: #161922;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 24px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #3b82f6;
            margin-bottom: 20px;
        }

        .table-scroll {
            overflow-x: auto;
            margin: 0 -8px;
            padding: 0 8px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 700px;
        }

        .data-table th,
        .data-table td {
            padding: 8px 10px;
            text-align: center;
            border-bottom: 1px solid #2a2d3a;
            white-space: nowrap;
        }

        .data-table th {
            color: #9ca3af;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: #0f1117;
            position: sticky;
            top: 0;
        }

        .data-table td:first-child {
            text-align: left;
            white-space: normal;
            min-width: 200px;
            color: #d1d5db;
        }

        .data-table td.unit-cell {
            color: #6b7280;
            font-size: 0.8rem;
        }

        .data-table .total-cell {
            font-weight: 700;
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .data-table .section-row td {
            background: rgba(59, 130, 246, 0.08);
            font-weight: 600;
            color: #3b82f6;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 2px solid #2a2d3a;
        }

        .data-table input {
            width: 80px;
            padding: 6px 8px;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.9rem;
            font-family: inherit;
            text-align: center;
            transition: border-color 0.2s;
        }

        .data-table input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .data-table input::placeholder {
            color: #4b5563;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        .result-item {
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .result-item .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 4px;
        }

        .result-item .label {
            font-size: 0.73rem;
            color: #9ca3af;
        }

        .result-item .unit {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn:hover { background: #2563eb; }

        .btn-outline {
            background: transparent;
            border: 1px solid #2a2d3a;
            color: #9ca3af;
        }

        .btn-outline:hover {
            background: #1e2130;
            color: #e0e0e0;
            border-color: #3b82f6;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #2a2d3a;
            color: #9ca3af;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }

        .toolbar-spacer { flex: 1; }

        @media (max-width: 768px) {
            .container { padding: 0 12px; margin: 16px auto; }
            .card { padding: 16px; }
            .results-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">ЖК</div>
    <h1>Инженерные системы — Жилой комплекс</h1>
    <span>Ведомость параметров</span>
</div>

<nav class="nav">
    <a href="index.html">Канализация (СП 30.13330)</a>
    <a href="complex.html" class="active">Жилой комплекс</a>
</nav>

<div class="container">
    <!-- Управление корпусами -->
    <div class="toolbar">
        <button class="btn" onclick="addBuilding()">+ Корпус</button>
        <button class="btn-outline btn" onclick="removeBuilding()">− Корпус</button>
        <div class="toolbar-spacer"></div>
        <button class="btn-outline btn" onclick="resetAll()">Сбросить</button>
    </div>

    <!-- Исходные данные -->
    <div class="card">
        <div class="card-title">Исходные данные по корпусам</div>
        <div class="table-scroll">
            <table class="data-table" id="input-table">
                <thead id="input-head"></thead>
                <tbody id="input-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Расчётные величины -->
    <div class="card">
        <div class="card-title">Расчётные величины</div>
        <div class="table-scroll">
            <table class="data-table">
                <thead id="calc-head"></thead>
                <tbody id="calc-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Сводка -->
    <div class="card">
        <div class="card-title">Сводка по комплексу</div>
        <div class="results-grid" id="summary"></div>
    </div>
</div>

<script>
// === Состояние ===
let buildings = [
    { id: 5, name: '№5' },
    { id: 6, name: '№6' },
    { id: 7, name: '№7' },
    { id: 8, name: '№8' },
];

// Параметры ввода
const PARAMS = [
    { id: 'k1',        label: 'Кол-во стояков К1',                                    unit: 'шт', step: 1 },
    { id: 'k2',        label: 'Кол-во стояков К2',                                    unit: 'шт', step: 1 },
    { id: 'k4',        label: 'Кол-во стояков К4',                                    unit: 'шт', step: 1 },
    { id: 'traps',     label: 'Кол-во лотков/трапов на этаже',                        unit: 'шт', step: 1 },
    { id: 'height',    label: 'Высота здания',                                        unit: 'м',  step: 0.1 },
    { id: 'floors',    label: 'Кол-во этажей',                                        unit: 'шт', step: 1 },
    { id: 'floor_h',   label: 'Высота этажа',                                         unit: 'м',  step: 0.1 },
    { id: 'sanitary',  label: 'Кол-во с/у МОП, ПУИ, лапомойки, с/у офис 1 эт',       unit: 'шт', step: 1 },
    { id: 'funnels',   label: 'Кол-во воронок кровельных',                             unit: 'шт', step: 1 },
    { id: 'apartments',label: 'Кол-во КВ (квартир)',                                   unit: 'шт', step: 1 },
];

// Значения по умолчанию из таблицы пользователя { paramId: { buildingId: value } }
const DEFAULTS = {
    k1:        { 5: 18, 6: 19, 7: 8,   8: 8 },
    k2:        { 5: 4,  6: 4,  7: 1,   8: 1 },
    k4:        { 5: 2,  6: 2,  7: '',  8: '' },
    traps:     { 5: 2,  6: 2,  7: '',  8: '' },
    height:    { 5: 96, 6: 96, 7: 24,  8: 20 },
    floors:    { 5: 28, 6: 28, 7: 7,   8: 6 },
    floor_h:   { 5: 3.3,6: 3.3,7: 3.3, 8: 3.3 },
    sanitary:  { 5: 8,  6: 13, 7: 6,   8: 3 },
    funnels:   { 5: 6,  6: 10, 7: 2,   8: 6 },
    apartments:{ 5: '', 6: '', 7: '',  8: '' },
};

// Расчётные строки
const CALCS = [
    { id: 'len_k1',      label: 'Длина стояков К1',               unit: 'м',  calc: (b) => val('k1', b) * val('height', b) },
    { id: 'len_k2',      label: 'Длина стояков К2',               unit: 'м',  calc: (b) => val('k2', b) * val('height', b) },
    { id: 'len_k4',      label: 'Длина стояков К4',               unit: 'м',  calc: (b) => val('k4', b) * val('height', b) },
    { id: 'total_traps', label: 'Лотков/трапов всего в здании',   unit: 'шт', calc: (b) => val('traps', b) * val('floors', b) },
    { id: 'total_san',   label: 'С/у МОП всего (по зданию)',      unit: 'шт', calc: (b) => val('sanitary', b) },
    { id: 'total_fun',   label: 'Воронок кровельных всего',       unit: 'шт', calc: (b) => val('funnels', b) },
];

// === Утилиты ===
function val(paramId, buildingId) {
    const el = document.getElementById(`inp_${paramId}_${buildingId}`);
    return el ? (parseFloat(el.value) || 0) : 0;
}

function fmt(v) {
    if (v === 0) return '—';
    return v % 1 === 0 ? v.toString() : v.toFixed(1);
}

// === Рендер ===
function render() {
    renderInputTable();
    recalculate();
}

function renderInputTable() {
    const head = document.getElementById('input-head');
    const body = document.getElementById('input-body');

    // Заголовок
    head.innerHTML = `<tr>
        <th style="text-align:left">Система / Корпуса</th>
        <th>Ед. изм.</th>
        ${buildings.map(b => `<th>Корпус ${b.name}</th>`).join('')}
        <th>Итого</th>
    </tr>`;

    // Строки параметров
    body.innerHTML = PARAMS.map(p => `<tr>
        <td>${p.label}</td>
        <td class="unit-cell">${p.unit}</td>
        ${buildings.map(b => {
            const def = (DEFAULTS[p.id] && DEFAULTS[p.id][b.id] !== undefined) ? DEFAULTS[p.id][b.id] : '';
            return `<td><input type="number" id="inp_${p.id}_${b.id}"
                value="${def}" min="0" step="${p.step}"
                placeholder="0" oninput="recalculate()"></td>`;
        }).join('')}
        <td class="total-cell" id="total_${p.id}">—</td>
    </tr>`).join('');

    // Заголовок расчётной таблицы
    document.getElementById('calc-head').innerHTML = `<tr>
        <th style="text-align:left">Параметр</th>
        <th>Ед. изм.</th>
        ${buildings.map(b => `<th>Корпус ${b.name}</th>`).join('')}
        <th>Итого</th>
    </tr>`;
}

function recalculate() {
    // Итого по входным параметрам
    PARAMS.forEach(p => {
        let sum = 0;
        buildings.forEach(b => { sum += val(p.id, b.id); });
        document.getElementById(`total_${p.id}`).textContent = fmt(sum);
    });

    // Расчётные величины
    const calcBody = document.getElementById('calc-body');
    calcBody.innerHTML = CALCS.map(c => {
        let sum = 0;
        const cells = buildings.map(b => {
            const v = c.calc(b.id);
            sum += v;
            return `<td>${fmt(v)}</td>`;
        }).join('');
        return `<tr>
            <td>${c.label}</td>
            <td class="unit-cell">${c.unit}</td>
            ${cells}
            <td class="total-cell">${fmt(sum)}</td>
        </tr>`;
    }).join('');

    // Сводка
    renderSummary();
}

function renderSummary() {
    const grid = document.getElementById('summary');

    const totalApt = buildings.reduce((s, b) => s + val('apartments', b.id), 0);
    const totalK1  = buildings.reduce((s, b) => s + val('k1', b.id) * val('height', b.id), 0);
    const totalK2  = buildings.reduce((s, b) => s + val('k2', b.id) * val('height', b.id), 0);
    const totalK4  = buildings.reduce((s, b) => s + val('k4', b.id) * val('height', b.id), 0);
    const totalPipe = totalK1 + totalK2 + totalK4;
    const totalTraps = buildings.reduce((s, b) => s + val('traps', b.id) * val('floors', b.id), 0);
    const totalFun  = buildings.reduce((s, b) => s + val('funnels', b.id), 0);
    const totalSan  = buildings.reduce((s, b) => s + val('sanitary', b.id), 0);
    const totalFloors = buildings.reduce((s, b) => s + val('floors', b.id), 0);
    const totalRisers = buildings.reduce((s, b) => s + val('k1', b.id) + val('k2', b.id) + val('k4', b.id), 0);

    grid.innerHTML = `
        <div class="result-item">
            <div class="value">${buildings.length}</div>
            <div class="label">Корпусов</div>
        </div>
        <div class="result-item">
            <div class="value">${fmt(totalApt)}</div>
            <div class="label">Квартир (КВ)</div>
        </div>
        <div class="result-item">
            <div class="value">${totalFloors}</div>
            <div class="label">Этажей суммарно</div>
        </div>
        <div class="result-item">
            <div class="value">${totalRisers}</div>
            <div class="label">Стояков всего (К1+К2+К4)</div>
        </div>
        <div class="result-item">
            <div class="value">${fmt(totalPipe)} <span class="unit">м</span></div>
            <div class="label">Стояков суммарная длина</div>
        </div>
        <div class="result-item">
            <div class="value">${fmt(totalK1)} <span class="unit">м</span></div>
            <div class="label">Стояки К1 — длина</div>
        </div>
        <div class="result-item">
            <div class="value">${fmt(totalK2)} <span class="unit">м</span></div>
            <div class="label">Стояки К2 — длина</div>
        </div>
        <div class="result-item">
            <div class="value">${fmt(totalK4)} <span class="unit">м</span></div>
            <div class="label">Стояки К4 — длина</div>
        </div>
        <div class="result-item">
            <div class="value">${fmt(totalTraps)}</div>
            <div class="label">Лотков/трапов всего</div>
        </div>
        <div class="result-item">
            <div class="value">${totalFun}</div>
            <div class="label">Воронок кровельных</div>
        </div>
        <div class="result-item">
            <div class="value">${totalSan}</div>
            <div class="label">С/у МОП и офис</div>
        </div>
    `;
}

// === Управление корпусами ===
let nextBuildingId = 9;

function addBuilding() {
    buildings.push({ id: nextBuildingId, name: `№${nextBuildingId}` });
    nextBuildingId++;
    render();
}

function removeBuilding() {
    if (buildings.length <= 1) return;
    buildings.pop();
    render();
}

function resetAll() {
    buildings = [
        { id: 5, name: '№5' },
        { id: 6, name: '№6' },
        { id: 7, name: '№7' },
        { id: 8, name: '№8' },
    ];
    nextBuildingId = 9;
    // Сброс DEFAULTS не нужен — они неизменяемы
    render();
}

// === Инициализация ===
render();
</script>

</body>
</html>
