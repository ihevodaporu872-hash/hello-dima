<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расчёт инженерных систем — Жилой комплекс</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0f1117;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.5;
        }

        .header {
            background: #161922;
            border-bottom: 1px solid #2a2d3a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: #3b82f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            font-weight: 700;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f0f0;
        }

        .header span {
            font-size: 0.75rem;
            color: #6b7280;
            margin-left: auto;
        }

        .nav {
            background: #161922;
            border-bottom: 1px solid #2a2d3a;
            padding: 6px 24px;
            display: flex;
            gap: 4px;
            position: sticky;
            top: 65px;
            z-index: 99;
        }

        .nav a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.82rem;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav a:hover { color: #e0e0e0; background: #1e2130; }
        .nav a.active { color: #3b82f6; background: #1e2130; }

        .container {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: #161922;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 24px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #3b82f6;
            margin-bottom: 20px;
        }

        .table-scroll {
            overflow-x: auto;
            margin: 0 -8px;
            padding: 0 8px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            min-width: 600px;
        }

        .data-table th,
        .data-table td {
            padding: 4px 6px;
            text-align: center;
            border-bottom: 1px solid #2a2d3a;
            white-space: nowrap;
        }

        .data-table th {
            color: #9ca3af;
            font-weight: 600;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            background: #0f1117;
            position: sticky;
            top: 0;
        }

        .data-table td:first-child,
        .data-table th:first-child {
            text-align: left;
            white-space: normal;
            width: 120px;
            min-width: 90px;
            max-width: 120px;
            color: #d1d5db;
            font-size: 0.76rem;
        }

        .data-table td.unit-cell {
            color: #6b7280;
            font-size: 0.72rem;
        }

        .dn-select {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 2px 2px;
            font-size: 0.7rem;
            cursor: pointer;
            width: 52px;
        }
        .dn-select:focus { border-color: #3b82f6; outline: none; }
        .dn-select-pair { width: 76px; }
        .dn-mini {
            background: transparent;
            color: #64748b;
            border: none;
            border-bottom: 1px dashed #334155;
            border-radius: 0;
            padding: 0 1px;
            font-size: 0.58rem;
            cursor: pointer;
            width: 36px;
            appearance: none;
            -webkit-appearance: none;
        }
        .dn-mini:focus { border-bottom-color: #3b82f6; outline: none; }
        .dn-mini-pair { width: 52px; }

        .dn-toggle {
            cursor: pointer; font-size: 0.7rem; opacity: 0.4;
            user-select: none; margin-left: 4px;
        }
        .dn-toggle:hover, .dn-toggle.active { opacity: 1; }

        .data-table .total-cell {
            font-weight: 700;
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .data-table .section-row td {
            background: rgba(59, 130, 246, 0.08);
            font-weight: 600;
            color: #3b82f6;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 2px solid #2a2d3a;
        }

        .data-table input {
            width: 64px;
            padding: 3px 4px;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 0.8rem;
            font-family: inherit;
            text-align: center;
            transition: border-color 0.2s;
        }

        .data-table input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .data-table input::placeholder {
            color: #4b5563;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        .result-item {
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .result-item .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 4px;
        }

        .result-item .label {
            font-size: 0.73rem;
            color: #9ca3af;
        }

        .result-item .unit {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn:hover { background: #2563eb; }

        .btn-outline {
            background: transparent;
            border: 1px solid #2a2d3a;
            color: #9ca3af;
        }

        .btn-outline:hover {
            background: #1e2130;
            color: #e0e0e0;
            border-color: #3b82f6;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #2a2d3a;
            color: #9ca3af;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }

        .toolbar-spacer { flex: 1; }

        #tab-input, #tab-calc {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group-inline {
            margin-bottom: 16px;
            max-width: 300px;
        }

        .form-group-inline label {
            display: block;
            font-size: 0.78rem;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .form-group-inline select {
            width: 100%;
            padding: 8px 10px;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .form-group-inline select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-group-inline select option {
            background: #161922;
        }

        .data-table .row-rab td {
            background: rgba(245, 158, 11, 0.08);
            font-weight: 600;
            font-style: italic;
            color: #f59e0b;
            border-top: 2px solid #2a2d3a;
        }

        .data-table .row-mat td:nth-child(2) {
            color: #6b7280;
            font-size: 0.7rem;
        }

        .data-table td.type-cell {
            font-size: 0.5rem;
            font-weight: 600;
            width: 24px !important;
            min-width: 24px !important;
            max-width: 24px !important;
        }

        .row-rab .type-cell { color: #f59e0b; }
        .row-mat .type-cell { color: #6b7280; }

        @media (max-width: 768px) {
            .container { padding: 0 12px; margin: 16px auto; }
            .card { padding: 16px; }
            .results-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">ЖК</div>
    <h1>Инженерные системы — Жилой комплекс</h1>
    <span>Ведомость параметров</span>
</div>

<nav class="nav">
    <a href="#" class="active" onclick="switchTab('input', this); return false;">Исходные данные</a>
    <a href="#" onclick="switchTab('calc', this); return false;">Расчёт</a>
    <a href="#" onclick="switchTab('prices', this); return false;">Прайс-листы</a>
</nav>

<div class="container">
    <!-- === Вкладка: Исходные данные === -->
    <div id="tab-input">
        <div class="toolbar">
            <button class="btn" onclick="addBuilding()">+ Корпус</button>
            <button class="btn-outline btn" onclick="removeBuilding()">− Корпус</button>
            <div class="toolbar-spacer"></div>
            <button class="btn-outline btn" onclick="resetAll()">Сбросить</button>
        </div>

        <div class="card">
            <div class="card-title">Исходные данные по корпусам</div>
            <div class="table-scroll">
                <table class="data-table" id="input-table">
                    <thead id="input-head"></thead>
                    <tbody id="input-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- === Вкладка: Расчёт === -->
    <div id="tab-calc" style="display:none">
        <div class="card">
            <div class="card-title">Расчёт системы хоз-быт К1</div>
            <div style="display:flex;gap:16px;flex-wrap:wrap">
                <div class="form-group-inline">
                    <label>Материал стояков</label>
                    <select id="material-k1" onchange="onMaterialChange()">
                        <option value="cast_iron">Чугун (SML)</option>
                        <option value="pvc">ПВХ</option>
                    </select>
                </div>
                <div class="form-group-inline" id="brand-group-iron">
                    <label>Бренд</label>
                    <select id="brand-iron" onchange="recalculate()">
                        <option value="AVF">AVF</option>
                        <option value="Smart" selected>Smart</option>
                        <option value="Con-Pipe">Con-Pipe</option>
                        <option value="Pam-Global">Pam-Global</option>
                        <option value="Halifax">Halifax</option>
                    </select>
                </div>
                <div class="form-group-inline" id="brand-group-pvc" style="display:none">
                    <label>Бренд</label>
                    <select id="brand-pvc" onchange="recalculate()">
                        <option value="Контур-Уют">Контур-Уют</option>
                        <option value="РосТурПласт">РосТурПласт</option>
                        <option value="Ostendorf" selected>Ostendorf</option>
                        <option value="Pro Aqua">Pro Aqua</option>
                        <option value="Rehau">Rehau</option>
                        <option value="Синикон">Синикон</option>
                        <option value="Uponor">Uponor</option>
                        <option value="Valfex">Valfex</option>
                    </select>
                </div>
            </div>
            <div class="table-scroll">
                <table class="data-table">
                    <thead id="calc-k1-head"></thead>
                    <tbody id="calc-k1-body"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Расчёт системы хоз-быт К1.1 Аренда</div>
            <div style="display:flex;gap:16px;flex-wrap:wrap">
                <div class="form-group-inline">
                    <label>Материал водостока</label>
                    <select id="material-k11" onchange="onMaterialChangeK11()">
                        <option value="cast_iron">Чугун (SML)</option>
                        <option value="pvc">ПВХ</option>
                    </select>
                </div>
                <div class="form-group-inline" id="brand-group-iron-k11">
                    <label>Бренд</label>
                    <select id="brand-iron-k11" onchange="recalculate()">
                        <option value="AVF">AVF</option>
                        <option value="Smart" selected>Smart</option>
                        <option value="Con-Pipe">Con-Pipe</option>
                        <option value="Pam-Global">Pam-Global</option>
                        <option value="Halifax">Halifax</option>
                    </select>
                </div>
                <div class="form-group-inline" id="brand-group-pvc-k11" style="display:none">
                    <label>Бренд</label>
                    <select id="brand-pvc-k11" onchange="recalculate()">
                        <option value="Контур-Уют">Контур-Уют</option>
                        <option value="РосТурПласт">РосТурПласт</option>
                        <option value="Ostendorf" selected>Ostendorf</option>
                        <option value="Pro Aqua">Pro Aqua</option>
                        <option value="Rehau">Rehau</option>
                        <option value="Синикон">Синикон</option>
                        <option value="Uponor">Uponor</option>
                        <option value="Valfex">Valfex</option>
                    </select>
                </div>
            </div>
            <div class="table-scroll">
                <table class="data-table">
                    <thead id="calc-k11-head"></thead>
                    <tbody id="calc-k11-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- === Вкладка: Прайс-листы === -->
    <div id="tab-prices" style="display:none">
        <div class="card">
            <div class="card-title">Прайс-лист — Master Catalog</div>
            <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
                <input type="text" id="price-search" placeholder="Поиск по названию или ID..." oninput="renderPriceTable()"
                    style="flex:1;min-width:200px;padding:8px 12px;background:#0f1117;border:1px solid #2a2d3a;border-radius:6px;color:#e0e0e0;font-size:0.85rem;font-family:inherit">
                <button class="btn" onclick="document.getElementById('import-file').click()">Импорт прайс-листа</button>
                <input type="file" id="import-file" accept=".csv,.xlsx,.xls" style="display:none" onchange="importPriceList(this)">
            </div>
            <div id="import-status" style="display:none;margin-bottom:12px;padding:10px 14px;border-radius:8px;font-size:0.82rem"></div>
            <div class="table-scroll">
                <table class="data-table" id="price-table">
                    <thead id="price-head"></thead>
                    <tbody id="price-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// === Состояние ===
let buildings = [
    { id: 1, name: '№1' },
    { id: 2, name: '№2' },
    { id: 3, name: '№3' },
    { id: 4, name: '№4' },
];

// Параметры ввода
const PARAMS = [
    { id: 'k1',        label: 'Кол-во стояков К1',                                    unit: 'шт', step: 1 },
    { id: 'k2',        label: 'Кол-во стояков К2',                                    unit: 'шт', step: 1 },
    { id: 'k4',        label: 'Кол-во стояков К4',                                    unit: 'шт', step: 1 },
    { id: 'traps',     label: 'Кол-во лотков/трапов на этаже',                        unit: 'шт', step: 1 },
    { id: 'height',    label: 'Высота здания',                                        unit: 'м',  step: 0.1 },
    { id: 'floors',    label: 'Кол-во этажей',                                        unit: 'шт', step: 1 },
    { id: 'floor_h',   label: 'Высота этажа',                                         unit: 'м',  step: 0.1 },
    { id: 'sanitary',  label: 'Кол-во с/у МОП, ПУИ, лапомойки, с/у офис 1 эт',       unit: 'шт', step: 1 },
    { id: 'funnels',   label: 'Кол-во воронок кровельных',                             unit: 'шт', step: 1 },
    { id: 'apartments',label: 'Кол-во КВ (квартир)',                                   unit: 'шт', step: 1 },
    { id: 's_total',   label: 'S общая',                                               unit: 'м²', step: 1 },
    { id: 's_above',   label: 'S надземной части',                                     unit: 'м²', step: 1 },
    { id: 's_below',   label: 'S подземной части',                                     unit: 'м²', step: 1 },
];

// Значения по умолчанию из таблицы пользователя { paramId: { buildingId: value } }
const DEFAULTS = {
    k1:        { 1: 18, 2: 19, 3: 8,   4: 8 },
    k2:        { 1: 4,  2: 4,  3: 1,   4: 1 },
    k4:        { 1: 2,  2: 2,  3: '',  4: '' },
    traps:     { 1: 2,  2: 2,  3: '',  4: '' },
    height:    { 1: 96, 2: 96, 3: 24,  4: 20 },
    floors:    { 1: 28, 2: 28, 3: 7,   4: 6 },
    floor_h:   { 1: 3.3,2: 3.3,3: 3.3, 4: 3.3 },
    sanitary:  { 1: 8,  2: 13, 3: 6,   4: 3 },
    funnels:   { 1: 6,  2: 10, 3: 2,   4: 6 },
    apartments:{ 1: '', 2: '', 3: '',  4: '' },
};

// === Supabase ===
const SUPABASE_URL = 'https://dnytjdnzudzphgkkskni.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qDHNDEimzRMF1DDNTVNdeQ_LO2WRpQ-';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Маппинг бренда → колонка в Supabase
const BRAND_COL = {
    'AVF': 'price_avf',
    'Smart': 'price_smart',
    'Con-Pipe': 'price_conpipe',
    'Pam-Global': 'price_pamglobal',
    'Halifax': 'price_halifax',
    'Контур-Уют': 'price_kontur',
    'РосТурПласт': 'price_rosturplast',
    'Ostendorf': 'price_ostendorf',
    'Pro Aqua': 'price_proaqua',
    'Rehau': 'price_rehau',
    'Синикон': 'price_sinikon',
    'Uponor': 'price_uponor',
    'Valfex': 'price_valfex',
};

let pricesData = {}; // { id: { price_avf: 100, price_smart: 200, ... } }

async function loadPrices() {
    try {
        const { data, error } = await sb.from('Master Catalog').select('*');
        if (error) { console.error('Supabase error:', error); return; }
        pricesData = {};
        (data || []).forEach(row => { pricesData[row.id] = row; });
        recalculate();
    } catch(e) { console.error('Ошибка загрузки цен:', e); }
}

function getPrice(priceId, brand) {
    if (!priceId || !pricesData[priceId]) return 0;
    const col = BRAND_COL[brand] || '';
    return parseFloat(pricesData[priceId][col]) || 0;
}

// === Материалы К1 ===
// b = buildingId, dns = доступные диаметры, priceKey(dn) = id строки в Supabase
// pricePer = делитель цены (3 = цена за 3м трубу → за 1м)
const DN_SML = [50, 70, 80, 100, 125, 150, 200, 250, 300];
const DN_PAIRS = [
    '50_50',
    '70_50','70_70',
    '80_50','80_80',
    '100_50','100_70','100_80','100_100',
    '125_50','125_70','125_80','125_100','125_125',
    '150_70','150_80','150_100','150_125','150_150',
    '200_100','200_150','200_200',
    '250_150','250_200','250_250',
    '300_200','300_250','300_300',
];

const selectedDns = {}; // { 'cast_iron_0': 100, ... } — запоминает выбранный ДН

const MAT_CAST_IRON = [
    { type:'раб', name:'Монтаж трубы чугунной',                         unit:'м',  priceId:'montazh_truby_chug', calc: b => val('k1',b) * val('height',b) },
    { type:'мат', name:'Труба чугунная SML L=3000 мм',   brand:'Smart', unit:'м',  dns:DN_SML, defaultDn:100, pricePer:3, priceKey: dn=>`truba_${dn}`, calc: b => val('k1',b) * val('height',b) },
    { type:'мат', name:'Крестовина одноплоскостная чугун SML 88°', brand:'Smart', unit:'шт', dnPairs:DN_PAIRS, defaultPair:'100_100', priceKey: p=>`krest_${p}(88)`, calc: b => Math.ceil(val('k1',b) * val('floors',b) / 2) },
    { type:'мат', name:'Тройник чугун SML',              brand:'Smart', unit:'шт', dnPairs:DN_PAIRS, defaultPair:'100_100', priceKey: p=>`troynik_${p}(45)`, calc: b => Math.floor(val('k1',b) * val('floors',b) / 2) },
    { type:'мат', name:'Заглушка Konfix',                brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, priceKey: dn=>`zaglushka_${dn}`, calc: b => Math.ceil(val('k1',b) * val('floors',b) / 2) * 2 + Math.floor(val('k1',b) * val('floors',b) / 2) },
    { type:'мат', name:'Ревизия чугун SML',              brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, priceKey: dn=>`rev_${dn}`, calc: b => Math.ceil(val('k1',b) * val('height',b) / (3 * val('floor_h',b) || 1)) },
    { type:'мат', name:'Труба опорная',                  brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, priceKey: dn=>`opora_${dn}`, calc: b => Math.ceil(val('k1',b) * val('height',b) / (3 * val('floor_h',b) || 1)) },

// === Сохранение в localStorage ===
const STORAGE_KEY = 'complex_data';

function saveData() {
    const data = {};
    PARAMS.forEach(p => {
        data[p.id] = {};
        buildings.forEach(b => {
            data[p.id][b.id] = val(p.id, b.id) || '';
        });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ buildings, values: data }));
}

function loadData() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (saved.buildings && saved.buildings.length > 0) {
            buildings = saved.buildings;
            nextBuildingId = Math.max(...buildings.map(b => b.id)) + 1;
        }
        if (saved.values) {
            // Перезаписываем DEFAULTS сохранёнными значениями
            for (const paramId in saved.values) {
                if (DEFAULTS[paramId]) {
                    for (const bid in saved.values[paramId]) {
                        DEFAULTS[paramId][bid] = saved.values[paramId][bid];
                    }
                }
            }
        }
    } catch(e) { /* игнорируем ошибки парсинга */ }
}

// === Утилиты ===
function val(paramId, buildingId) {
    const el = document.getElementById(`inp_${paramId}_${buildingId}`);
    return el ? (parseFloat(el.value) || 0) : 0;
}

function fmt(v) {
    if (v === 0) return '—';
    return v % 1 === 0 ? v.toString() : v.toFixed(1);
}

// === Рендер ===
function render() {
    renderInputTable();
    recalculate();
}

function renderInputTable() {
    const head = document.getElementById('input-head');
    const body = document.getElementById('input-body');

    // Заголовок
    head.innerHTML = `<tr>
        <th style="text-align:left">Система / Корпуса</th>
        <th>Ед. изм.</th>
        ${buildings.map(b => `<th>Корпус ${b.name}</th>`).join('')}
        <th>Итого</th>
    </tr>`;

    // Строки параметров
    body.innerHTML = PARAMS.map(p => `<tr>
        <td>${p.label}</td>
        <td class="unit-cell">${p.unit}</td>
        ${buildings.map(b => {
            const def = (DEFAULTS[p.id] && DEFAULTS[p.id][b.id] !== undefined) ? DEFAULTS[p.id][b.id] : '';
            return `<td><input type="number" id="inp_${p.id}_${b.id}"
                value="${def}" min="0" step="${p.step}"
                placeholder="0" oninput="recalculate()"></td>`;
        }).join('')}
        <td class="total-cell" id="total_${p.id}">—</td>
    </tr>`).join('');

}

function recalculate() {
    // Итого по входным параметрам
    PARAMS.forEach(p => {
        let sum = 0;
        buildings.forEach(b => { sum += val(p.id, b.id); });
        document.getElementById(`total_${p.id}`).textContent = fmt(sum);
    });

    // Сохраняем данные
    saveData();

    // Расчёт К1
    renderCalcK1();

    // Расчёт К1.1
    renderCalcK11();
}

// Общий ДН: ставит дефолт для всех корпусов (сбрасывает индивидуальные)
function onDnMain(material, rowIdx, value) {
    const v = isNaN(+value) ? value : +value;
    selectedDns[material + '_main_' + rowIdx] = v;
    // Сбросить индивидуальные переопределения
    buildings.forEach(b => { delete selectedDns[material + '_' + rowIdx + '_' + b.id]; });
    recalculate();
}

        ? document.getElementById('brand-iron').value

    const head = document.getElementById('calc-k1-head');
    const body = document.getElementById('calc-k1-body');

    head.innerHTML = `<tr>

    let grandTotal = 0;
    body.innerHTML = rows.map((row, i) => {

        const defVal = isPair ? row.defaultPair : row.defaultDn;
        const mainKey = material + '_main_' + i;
        const mainDn = hasDn ? (selectedDns[mainKey] ?? defVal) : null;

        // Ячейка ДН (общий селектор слева)
        let dnCell = '<td></td>';
        if (hasDn && !isRab) {
            const opts = isPair ? row.dnPairs : row.dns;
            dnCell = `<td><select class="dn-select${isPair?' dn-select-pair':''}" onchange="onDnMain('${material}',${i},this.value)">` +
                opts.map(o => {
                    const label = isPair ? o.replace('_','×') : o;
                    return `<option value="${o}"${o==mainDn?' selected':''}>${label}</option>`;
                }).join('') + `</select></td>`;
        }

        let totalQty = 0;
        let totalCost = 0;

        const cells = buildings.map(b => {
            const qty = row.calc(b.id);
            totalQty += qty;

            // ДН: индивидуальный для корпуса или общий
            const bldKey = material + '_' + i + '_' + b.id;
            const curDn = hasDn ? (selectedDns[bldKey] ?? mainDn) : null;
            const expanded = hasDn && !!dnBldExpanded[b.id];

            let priceId = row.priceId || '';
            if (hasDn && row.priceKey) priceId = row.priceKey(curDn);

            let price = getPrice(priceId, selectedBrand);
            if (row.pricePer && price) price = +(price / row.pricePer).toFixed(2);
            totalCost += price * qty;

            // Селектор ДН (показывается только если ⚙ раскрыт для корпуса)
            let dnHtml = '';
            if (expanded && hasDn) {
                const opts = isPair ? row.dnPairs : row.dns;
                dnHtml = `<select class="dn-mini${isPair?' dn-mini-pair':''}" onchange="onDnChange('${bldKey}',this.value)">` +

                        const label = isPair ? o.replace('_','×') : o;

            }

            return expanded && hasDn
                ? `<td><div style="display:inline-flex;align-items:baseline;gap:2px">${dnHtml} <span>${fmt(qty)}</span></div></td>`
                : `<td>${fmt(qty)}</td>`;
        }).join('');

        totalCost = +totalCost.toFixed(2);
        grandTotal += totalCost;

        // Цена за единицу (по основному ДН)
        let basePrice = 0;
        {
            let pid = row.priceId || '';
            if (hasDn && row.priceKey) pid = row.priceKey(mainDn);
            basePrice = getPrice(pid, selectedBrand);
            if (row.pricePer && basePrice) basePrice = +(basePrice / row.pricePer).toFixed(2);
        }

        const brandLabel = row.brand ? selectedBrand : '';
        const nameText = brandLabel
            ? `${row.name} <span style="color:#6b7280;font-size:0.68rem">${brandLabel}</span>`

        return `<tr class="${isRab ? 'row-rab' : 'row-mat'}">

            <td style="text-align:left;white-space:normal;max-width:200px">${nameText}</td>
            <td class="unit-cell">${row.unit}</td>
            ${hasDn ? dnCell : '<td></td>'}

            <td style="color:#10b981;font-weight:600">${totalCost ? totalCost.toLocaleString('ru-RU') + ' ₽' : '—'}</td>
        </tr>`;
    }).join('');

    // Итого стоимость
    body.innerHTML += `<tr style="border-top:2px solid #3b82f6">
        <td colspan="${5 + buildings.length + 1}"></td>
        <td style="font-weight:700;color:#10b981">${grandTotal ? grandTotal.toLocaleString('ru-RU') + ' ₽' : '—'}</td>
    </tr>`;
}

// === Управление корпусами ===
let nextBuildingId = 5;

function addBuilding() {
    buildings.push({ id: nextBuildingId, name: `№${nextBuildingId}` });
    nextBuildingId++;
    render();
}

function removeBuilding() {
    if (buildings.length <= 1) return;
    buildings.pop();
    render();
}

function resetAll() {
    buildings = [
        { id: 1, name: '№1' },
    ];
    nextBuildingId = 2;
    // Очищаем defaults чтобы поля были пустыми
    for (const key in DEFAULTS) {
        for (const bid in DEFAULTS[key]) {
            DEFAULTS[key][bid] = '';
        }
    }
    localStorage.removeItem(STORAGE_KEY);
    render();
}

function switchTab(tabId, linkEl) {
    document.getElementById('tab-input').style.display = tabId === 'input' ? '' : 'none';
    document.getElementById('tab-calc').style.display = tabId === 'calc' ? '' : 'none';
    document.getElementById('tab-prices').style.display = tabId === 'prices' ? '' : 'none';
    document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
    linkEl.classList.add('active');
    localStorage.setItem('complex_active_tab', tabId);
    if (tabId === 'prices') renderPriceTable();
    recalculate();
}

        <th style="text-align:left">Наименование</th>
        <th>ДН</th>
        ${priceCols.map(col => `<th>${BRAND_NAMES[col] || col}</th>`).join('')}
    </tr>`;

    const filtered = allRows.filter(r => {
        if (!search) return true;
        return (r.id || '').toLowerCase().includes(search) ||
               (r.Name || '').toLowerCase().includes(search) ||
               (r.DN || '').toString().toLowerCase().includes(search);
    });

    filtered.sort((a, b) => (a.Name || '').localeCompare(b.Name || '', 'ru'));

    body.innerHTML = filtered.map(r => `<tr>
        <td style="text-align:left;font-size:0.68rem;color:#6b7280">${r.id || ''}</td>
        <td style="text-align:left;white-space:normal;max-width:200px">${r.Name || ''}</td>
        <td>${r.DN || '—'}</td>
        ${priceCols.map(col => {
            const v = r[col];
            return `<td style="color:${v ? '#e0e0e0' : '#333'}">${v ? parseFloat(v).toLocaleString('ru-RU') + ' ₽' : '—'}</td>`;
        }).join('')}
    </tr>`).join('');
}

// === Импорт прайс-листа ===
function showImportStatus(msg, isError) {
    const el = document.getElementById('import-status');
    el.style.display = '';
    el.style.background = isError ? 'rgba(239,68,68,0.15)' : 'rgba(16,185,129,0.15)';
    el.style.color = isError ? '#ef4444' : '#10b981';
    el.style.border = `1px solid ${isError ? '#ef4444' : '#10b981'}`;
    el.textContent = msg;
    if (!isError) setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return [];
    // Разделитель: ; или ,
    const sep = lines[0].includes(';') ? ';' : ',';
    const headers = lines[0].split(sep).map(h => h.trim().replace(/^["']|["']$/g, ''));
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
        const vals = lines[i].split(sep).map(v => v.trim().replace(/^["']|["']$/g, ''));
        const obj = {};
        headers.forEach((h, idx) => { obj[h] = vals[idx] || ''; });
        rows.push(obj);
    }
    return rows;
}

async function importPriceList(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';

    if (!file.name.endsWith('.csv')) {
        showImportStatus('Поддерживается только CSV формат. Сохраните Excel как CSV.', true);
        return;
    }

    try {
        const text = await file.text();
        const rows = parseCSV(text);
        if (!rows.length) {
            showImportStatus('Файл пустой или неверный формат.', true);
            return;
        }

        // Проверяем что есть колонка id
        if (!rows[0].hasOwnProperty('id')) {
            showImportStatus('В CSV нет колонки "id". Нужны колонки: id, Name, DN, price_smart, ...', true);
            return;
        }

        showImportStatus(`Импорт ${rows.length} строк...`, false);

        let updated = 0;
        let inserted = 0;
        let errors = 0;

        for (const row of rows) {
            if (!row.id) continue;
            // Преобразуем числовые поля
            const record = { id: row.id };
            if (row.Name !== undefined) record.Name = row.Name;
            if (row.DN !== undefined) record.DN = row.DN;
            for (const key of Object.keys(row)) {
                if (key.startsWith('price_')) {
                    const num = parseFloat(row[key]);
                    record[key] = isNaN(num) ? null : num;
                }
            }

            const { error } = await sb.from('Master Catalog').upsert(record, { onConflict: 'id' });
            if (error) {
                console.error('Ошибка импорта строки', row.id, error);
                errors++;
            } else {
                if (pricesData[row.id]) updated++; else inserted++;
            }
        }

        await loadPrices();
        renderPriceTable();
        showImportStatus(`Готово! Добавлено: ${inserted}, обновлено: ${updated}${errors ? ', ошибок: ' + errors : ''}`, errors > 0);
    } catch(e) {
        console.error('Ошибка импорта:', e);
        showImportStatus('Ошибка чтения файла: ' + e.message, true);
    }
}

// === Инициализация ===
loadData();
render();
loadPrices();

// Восстановление активной вкладки

if (savedTab && savedTab !== 'input') {
    const links = document.querySelectorAll('.nav a');
    const idx = savedTab === 'calc' ? 1 : savedTab === 'prices' ? 2 : 0;
    switchTab(savedTab, links[idx]);
}
