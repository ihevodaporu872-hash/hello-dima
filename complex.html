<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расчёт инженерных систем — Жилой комплекс</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0f1117;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.5;
        }

        .header {
            background: #161922;
            border-bottom: 1px solid #2a2d3a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: #3b82f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            font-weight: 700;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f0f0;
        }

        .header span {
            font-size: 0.75rem;
            color: #6b7280;
            margin-left: auto;
        }

        .nav {
            background: #161922;
            border-bottom: 1px solid #2a2d3a;
            padding: 6px 24px;
            display: flex;
            gap: 4px;
        }

        .nav a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.82rem;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav a:hover { color: #e0e0e0; background: #1e2130; }
        .nav a.active { color: #3b82f6; background: #1e2130; }

        .container {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: #161922;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 24px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #3b82f6;
            margin-bottom: 20px;
        }

        .table-scroll {
            overflow-x: auto;
            margin: 0 -8px;
            padding: 0 8px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            min-width: 600px;
        }

        .data-table th,
        .data-table td {
            padding: 4px 6px;
            text-align: center;
            border-bottom: 1px solid #2a2d3a;
            white-space: nowrap;
        }

        .data-table th {
            color: #9ca3af;
            font-weight: 600;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            background: #0f1117;
            position: sticky;
            top: 0;
        }

        .data-table td:first-child,
        .data-table th:first-child {
            text-align: left;
            white-space: normal;
            width: 120px;
            min-width: 90px;
            max-width: 120px;
            color: #d1d5db;
            font-size: 0.76rem;
        }

        .data-table td.unit-cell {
            color: #6b7280;
            font-size: 0.72rem;
        }

        .dn-select {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 2px 2px;
            font-size: 0.7rem;
            cursor: pointer;
            width: 52px;
        }
        .dn-select:focus { border-color: #3b82f6; outline: none; }
        .dn-pair {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 1px 2px;
        }
        .dn-pair span { color: #6b7280; font-size: 0.65rem; }
        .dn-pair .dn-select { border: none; width: 46px; padding: 1px 0; }

        .data-table .total-cell {
            font-weight: 700;
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .data-table .section-row td {
            background: rgba(59, 130, 246, 0.08);
            font-weight: 600;
            color: #3b82f6;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 2px solid #2a2d3a;
        }

        .data-table input {
            width: 64px;
            padding: 3px 4px;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 0.8rem;
            font-family: inherit;
            text-align: center;
            transition: border-color 0.2s;
        }

        .data-table input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .data-table input::placeholder {
            color: #4b5563;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        .result-item {
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .result-item .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 4px;
        }

        .result-item .label {
            font-size: 0.73rem;
            color: #9ca3af;
        }

        .result-item .unit {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn:hover { background: #2563eb; }

        .btn-outline {
            background: transparent;
            border: 1px solid #2a2d3a;
            color: #9ca3af;
        }

        .btn-outline:hover {
            background: #1e2130;
            color: #e0e0e0;
            border-color: #3b82f6;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #2a2d3a;
            color: #9ca3af;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }

        .toolbar-spacer { flex: 1; }

        #tab-input, #tab-calc {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group-inline {
            margin-bottom: 16px;
            max-width: 300px;
        }

        .form-group-inline label {
            display: block;
            font-size: 0.78rem;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .form-group-inline select {
            width: 100%;
            padding: 8px 10px;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .form-group-inline select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-group-inline select option {
            background: #161922;
        }

        .data-table .row-rab td {
            background: rgba(245, 158, 11, 0.08);
            font-weight: 600;
            font-style: italic;
            color: #f59e0b;
            border-top: 2px solid #2a2d3a;
        }

        .data-table .row-mat td:nth-child(2) {
            color: #6b7280;
            font-size: 0.7rem;
        }

        .data-table td.type-cell {
            font-size: 0.5rem;
            font-weight: 600;
            width: 24px !important;
            min-width: 24px !important;
            max-width: 24px !important;
        }

        .row-rab .type-cell { color: #f59e0b; }
        .row-mat .type-cell { color: #6b7280; }

        @media (max-width: 768px) {
            .container { padding: 0 12px; margin: 16px auto; }
            .card { padding: 16px; }
            .results-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">ЖК</div>
    <h1>Инженерные системы — Жилой комплекс</h1>
    <span>Ведомость параметров</span>
</div>

<nav class="nav">
    <a href="#" class="active" onclick="switchTab('input', this); return false;">Исходные данные</a>
    <a href="#" onclick="switchTab('calc', this); return false;">Расчёт</a>
</nav>

<div class="container">
    <!-- === Вкладка: Исходные данные === -->
    <div id="tab-input">
        <div class="toolbar">
            <button class="btn" onclick="addBuilding()">+ Корпус</button>
            <button class="btn-outline btn" onclick="removeBuilding()">− Корпус</button>
            <div class="toolbar-spacer"></div>
            <button class="btn-outline btn" onclick="resetAll()">Сбросить</button>
        </div>

        <div class="card">
            <div class="card-title">Исходные данные по корпусам</div>
            <div class="table-scroll">
                <table class="data-table" id="input-table">
                    <thead id="input-head"></thead>
                    <tbody id="input-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- === Вкладка: Расчёт === -->
    <div id="tab-calc" style="display:none">
        <div class="card">
            <div class="card-title">Расчёт системы хоз-быт К1</div>
            <div style="display:flex;gap:16px;flex-wrap:wrap">
                <div class="form-group-inline">
                    <label>Материал стояков</label>
                    <select id="material-k1" onchange="onMaterialChange()">
                        <option value="cast_iron">Чугун (SML)</option>
                        <option value="pvc">ПВХ</option>
                    </select>
                </div>
                <div class="form-group-inline" id="brand-group-iron">
                    <label>Бренд</label>
                    <select id="brand-iron" onchange="recalculate()">
                        <option value="AVF">AVF</option>
                        <option value="Smart" selected>Smart</option>
                        <option value="Con-Pipe">Con-Pipe</option>
                        <option value="Pam-Global">Pam-Global</option>
                        <option value="Halifax">Halifax</option>
                    </select>
                </div>
                <div class="form-group-inline" id="brand-group-pvc" style="display:none">
                    <label>Бренд</label>
                    <select id="brand-pvc" onchange="recalculate()">
                        <option value="Контур-Уют">Контур-Уют</option>
                        <option value="РосТурПласт">РосТурПласт</option>
                        <option value="Ostendorf" selected>Ostendorf</option>
                        <option value="Pro Aqua">Pro Aqua</option>
                        <option value="Rehau">Rehau</option>
                        <option value="Синикон">Синикон</option>
                        <option value="Uponor">Uponor</option>
                        <option value="Valfex">Valfex</option>
                    </select>
                </div>
            </div>
            <div class="table-scroll">
                <table class="data-table">
                    <thead id="calc-k1-head"></thead>
                    <tbody id="calc-k1-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// === Состояние ===
let buildings = [
    { id: 1, name: '№1' },
    { id: 2, name: '№2' },
    { id: 3, name: '№3' },
    { id: 4, name: '№4' },
];

// Параметры ввода
const PARAMS = [
    { id: 'k1',        label: 'Кол-во стояков К1',                                    unit: 'шт', step: 1 },
    { id: 'k2',        label: 'Кол-во стояков К2',                                    unit: 'шт', step: 1 },
    { id: 'k4',        label: 'Кол-во стояков К4',                                    unit: 'шт', step: 1 },
    { id: 'traps',     label: 'Кол-во лотков/трапов на этаже',                        unit: 'шт', step: 1 },
    { id: 'height',    label: 'Высота здания',                                        unit: 'м',  step: 0.1 },
    { id: 'floors',    label: 'Кол-во этажей',                                        unit: 'шт', step: 1 },
    { id: 'floor_h',   label: 'Высота этажа',                                         unit: 'м',  step: 0.1 },
    { id: 'sanitary',  label: 'Кол-во с/у МОП, ПУИ, лапомойки, с/у офис 1 эт',       unit: 'шт', step: 1 },
    { id: 'funnels',   label: 'Кол-во воронок кровельных',                             unit: 'шт', step: 1 },
    { id: 'apartments',label: 'Кол-во КВ (квартир)',                                   unit: 'шт', step: 1 },
];

// Значения по умолчанию из таблицы пользователя { paramId: { buildingId: value } }
const DEFAULTS = {
    k1:        { 1: 18, 2: 19, 3: 8,   4: 8 },
    k2:        { 1: 4,  2: 4,  3: 1,   4: 1 },
    k4:        { 1: 2,  2: 2,  3: '',  4: '' },
    traps:     { 1: 2,  2: 2,  3: '',  4: '' },
    height:    { 1: 96, 2: 96, 3: 24,  4: 20 },
    floors:    { 1: 28, 2: 28, 3: 7,   4: 6 },
    floor_h:   { 1: 3.3,2: 3.3,3: 3.3, 4: 3.3 },
    sanitary:  { 1: 8,  2: 13, 3: 6,   4: 3 },
    funnels:   { 1: 6,  2: 10, 3: 2,   4: 6 },
    apartments:{ 1: '', 2: '', 3: '',  4: '' },
};

// === Supabase ===
const SUPABASE_URL = 'https://dnytjdnzudzphgkkskni.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qDHNDEimzRMF1DDNTVNdeQ_LO2WRpQ-';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Маппинг бренда → колонка в Supabase
const BRAND_COL = {
    'AVF': 'price_avf',
    'Smart': 'price_smart',
    'Con-Pipe': 'price_conpipe',
    'Pam-Global': 'price_pamglobal',
    'Halifax': 'price_halifax',
    'Контур-Уют': 'price_kontur',
    'РосТурПласт': 'price_rosturplast',
    'Ostendorf': 'price_ostendorf',
    'Pro Aqua': 'price_proaqua',
    'Rehau': 'price_rehau',
    'Синикон': 'price_sinikon',
    'Uponor': 'price_uponor',
    'Valfex': 'price_valfex',
};

let pricesData = {}; // { id: { price_avf: 100, price_smart: 200, ... } }

async function loadPrices() {
    try {
        const { data, error } = await sb.from('Master Catalog').select('*');
        if (error) { console.error('Supabase error:', error); return; }
        pricesData = {};
        (data || []).forEach(row => { pricesData[row.id] = row; });
        recalculate();
    } catch(e) { console.error('Ошибка загрузки цен:', e); }
}

function getPrice(priceId, brand) {
    if (!priceId || !pricesData[priceId]) return 0;
    const col = BRAND_COL[brand] || '';
    return parseFloat(pricesData[priceId][col]) || 0;
}

// === Материалы К1 ===
// b = buildingId, dns = доступные диаметры, priceKey(dn) = id строки в Supabase
// pricePer = делитель цены (3 = цена за 3м трубу → за 1м)
const DN_SML = [50, 70, 80, 100, 125, 150, 200, 250, 300];

const selectedDns = {}; // { 'cast_iron_0': 100, ... } — запоминает выбранный ДН

const MAT_CAST_IRON = [
    { type:'раб', name:'Монтаж трубы чугунной',                         unit:'м',  priceId:'montazh_truby_chug', calc: b => val('k1',b) * val('height',b) },
    { type:'мат', name:'Труба чугунная SML L=3000 мм',   brand:'Smart', unit:'м',  dns:DN_SML, defaultDn:100, pricePer:3, priceKey: dn=>`truba_${dn}`, calc: b => val('k1',b) * val('height',b) },
    { type:'мат', name:'Крестовина одноплоскостная чугун SML 88°', brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, dns2:DN_SML, defaultDn2:100, priceKey: (d1,d2)=>`krest_${d1}_${d2}(88)`, calc: b => Math.ceil(val('k1',b) * val('floors',b) / 2) },
    { type:'мат', name:'Тройник чугун SML',              brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, dns2:DN_SML, defaultDn2:100, priceKey: (d1,d2)=>`troynik_${d1}_${d2}(45)`, calc: b => Math.floor(val('k1',b) * val('floors',b) / 2) },
    { type:'мат', name:'Заглушка Konfix',                brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, priceKey: dn=>`zaglushka_${dn}`, calc: b => Math.ceil(val('k1',b) * val('floors',b) / 2) * 2 + Math.floor(val('k1',b) * val('floors',b) / 2) },
    { type:'мат', name:'Ревизия чугун SML',              brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, priceKey: dn=>`rev_${dn}`, calc: b => Math.ceil(val('k1',b) * val('height',b) / (3 * val('floor_h',b) || 1)) },
    { type:'мат', name:'Труба опорная',                  brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, priceKey: dn=>`opora_${dn}`, calc: b => Math.ceil(val('k1',b) * val('height',b) / (3 * val('floor_h',b) || 1)) },
    { type:'мат', name:'Кольцо опорное',                 brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, priceKey: dn=>`koltso_opornoe_${dn}`, calc: b => Math.ceil(val('k1',b) * val('height',b) / (3 * val('floor_h',b) || 1)) },
    { type:'мат', name:'Консоль опорная для чугунных труб', brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, priceKey: dn=>`konsol_opornaya_${dn}`, calc: b => Math.ceil(val('k1',b) * val('height',b) / (3 * val('floor_h',b) || 1)) },
    { type:'мат', name:'Хомут Rapid',                    brand:'Smart', unit:'шт', dns:DN_SML, defaultDn:100, priceKey: dn=>`rapid_${dn}`, calc: b => Math.ceil(val('k1',b) * val('floors',b) / 2) * 2 + Math.floor(val('k1',b) * val('floors',b) / 2) * 2 + Math.ceil(val('k1',b) * val('height',b) / (3 * val('floor_h',b) || 1)) * 2 + Math.ceil(val('k1',b) * val('height',b) / (3 * val('floor_h',b) || 1)) * 2 },
    { type:'мат', name:'Хомут для труб',                               unit:'шт', priceId:'khomut_trub', calc: b => Math.floor(val('k1',b) * val('height',b) / 1.65) },
    { type:'мат', name:'Цанга М12',                                    unit:'шт', priceId:'tsanga_m12', calc: b => Math.floor(val('k1',b) * val('height',b) / 1.65) },
    { type:'раб', name:'Монтаж теплоизоляции (гильзы)',                 unit:'шт', priceId:'montazh_teploizol', calc: b => val('k1',b) * val('floors',b) },
    { type:'мат', name:'Цилиндр теплоизол. Ду125 (L=0,3 м) на гильзы', unit:'м', priceId:'tsilindr_teploizol', calc: b => +(val('k1',b) * val('floors',b) * 0.3).toFixed(1) },
];

const MAT_PVC = [
    { type:'раб', name:'Монтаж труб ПВХ',                              unit:'м',  priceId:'montazh_truby_pvh', calc: b => val('k1',b) * val('height',b) },
    { type:'мат', name:'Труба ПВХ L=3000 мм',             brand:true,  unit:'м',  pricePer:3, priceId:'truba_pvh_110', calc: b => val('k1',b) * val('height',b) },
    { type:'мат', name:'Крестовина одноплоскостная ПВХ 88°', brand:true, unit:'шт', priceId:'krest_pvh_110_110(88)', calc: b => Math.ceil(val('k1',b) * val('floors',b) / 2) },
    { type:'мат', name:'Тройник ПВХ 88°',                 brand:true,  unit:'шт', priceId:'troynik_pvh_110_110(88)', calc: b => Math.floor(val('k1',b) * val('floors',b) / 2) },
    { type:'мат', name:'Заглушка ПВХ',                    brand:true,  unit:'шт', priceId:'zaglushka_pvh_110', calc: b => Math.ceil(val('k1',b) * val('floors',b) / 2) * 2 + Math.floor(val('k1',b) * val('floors',b) / 2) },
    { type:'мат', name:'Ревизия круглая ПВХ',             brand:true,  unit:'шт', priceId:'rev_pvh_110', calc: b => Math.ceil(val('k1',b) * val('height',b) / (3 * val('floor_h',b) || 1)) },
    { type:'мат', name:'Хомут для труб',                               unit:'шт', priceId:'khomut_trub_pvh', calc: b => Math.floor(val('k1',b) * val('height',b) / 1.65) },
    { type:'мат', name:'Цанга М12',                                    unit:'шт', priceId:'tsanga_m12_pvh', calc: b => Math.floor(val('k1',b) * val('height',b) / 1.65) },
    { type:'раб', name:'Монтаж муфты противопожарной (Огнеза)',         unit:'шт', priceId:'montazh_mufty', calc: b => val('k1',b) * val('floors',b) },
    { type:'мат', name:'Муфта противопожарная "ОГНЕЗА-ПМ/110"',        unit:'шт', priceId:'mufta_ogneza', calc: b => val('k1',b) * val('floors',b) },
];

// === Сохранение в localStorage ===
const STORAGE_KEY = 'complex_data';

function saveData() {
    const data = {};
    PARAMS.forEach(p => {
        data[p.id] = {};
        buildings.forEach(b => {
            data[p.id][b.id] = val(p.id, b.id) || '';
        });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ buildings, values: data }));
}

function loadData() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (saved.buildings && saved.buildings.length > 0) {
            buildings = saved.buildings;
            nextBuildingId = Math.max(...buildings.map(b => b.id)) + 1;
        }
        if (saved.values) {
            // Перезаписываем DEFAULTS сохранёнными значениями
            for (const paramId in saved.values) {
                if (DEFAULTS[paramId]) {
                    for (const bid in saved.values[paramId]) {
                        DEFAULTS[paramId][bid] = saved.values[paramId][bid];
                    }
                }
            }
        }
    } catch(e) { /* игнорируем ошибки парсинга */ }
}

// === Утилиты ===
function val(paramId, buildingId) {
    const el = document.getElementById(`inp_${paramId}_${buildingId}`);
    return el ? (parseFloat(el.value) || 0) : 0;
}

function fmt(v) {
    if (v === 0) return '—';
    return v % 1 === 0 ? v.toString() : v.toFixed(1);
}

// === Рендер ===
function render() {
    renderInputTable();
    recalculate();
}

function renderInputTable() {
    const head = document.getElementById('input-head');
    const body = document.getElementById('input-body');

    // Заголовок
    head.innerHTML = `<tr>
        <th style="text-align:left">Система / Корпуса</th>
        <th>Ед. изм.</th>
        ${buildings.map(b => `<th>Корпус ${b.name}</th>`).join('')}
        <th>Итого</th>
    </tr>`;

    // Строки параметров
    body.innerHTML = PARAMS.map(p => `<tr>
        <td>${p.label}</td>
        <td class="unit-cell">${p.unit}</td>
        ${buildings.map(b => {
            const def = (DEFAULTS[p.id] && DEFAULTS[p.id][b.id] !== undefined) ? DEFAULTS[p.id][b.id] : '';
            return `<td><input type="number" id="inp_${p.id}_${b.id}"
                value="${def}" min="0" step="${p.step}"
                placeholder="0" oninput="recalculate()"></td>`;
        }).join('')}
        <td class="total-cell" id="total_${p.id}">—</td>
    </tr>`).join('');

}

function recalculate() {
    // Итого по входным параметрам
    PARAMS.forEach(p => {
        let sum = 0;
        buildings.forEach(b => { sum += val(p.id, b.id); });
        document.getElementById(`total_${p.id}`).textContent = fmt(sum);
    });

    // Сохраняем данные
    saveData();

    // Расчёт К1
    renderCalcK1();
}

function onMaterialChange() {
    const material = document.getElementById('material-k1').value;
    document.getElementById('brand-group-iron').style.display = material === 'cast_iron' ? '' : 'none';
    document.getElementById('brand-group-pvc').style.display = material === 'pvc' ? '' : 'none';
    recalculate();
}

function onDnChange(key, value) {
    selectedDns[key] = +value;
    recalculate();
}

function renderCalcK1() {
    const materialSel = document.getElementById('material-k1');
    const material = materialSel ? materialSel.value : 'cast_iron';
    const rows = material === 'cast_iron' ? MAT_CAST_IRON : MAT_PVC;
    const selectedBrand = material === 'cast_iron'
        ? document.getElementById('brand-iron').value
        : document.getElementById('brand-pvc').value;

    const head = document.getElementById('calc-k1-head');
    const body = document.getElementById('calc-k1-body');

    head.innerHTML = `<tr>
        <th style="width:30px;min-width:30px"></th>
        <th style="text-align:left">Наименование</th>
        <th>ДН</th>
        <th>Ед. изм.</th>
        ${buildings.map(b => `<th>Корпус ${b.name}</th>`).join('')}
        <th>Итого</th>
        <th>Цена</th>
        <th>Стоимость</th>
    </tr>`;

    let grandTotal = 0;
    body.innerHTML = rows.map((row, i) => {
        const isRab = row.type === 'раб';
        let total = 0;
        const cells = buildings.map(b => {
            const v = row.calc(b.id);
            total += v;
            return `<td>${fmt(v)}</td>`;
        }).join('');

        // Диаметр
        const dnKey = material + '_' + i;
        const dn2Key = dnKey + '_2';
        const currentDn = row.dns ? (selectedDns[dnKey] || row.defaultDn) : null;
        const currentDn2 = row.dns2 ? (selectedDns[dn2Key] || row.defaultDn2) : null;
        let dnCell = '';
        if (row.dns) {
            const sel1 = `<select class="dn-select" onchange="onDnChange('${dnKey}',this.value)">` +
                row.dns.map(d => `<option value="${d}"${d===currentDn?' selected':''}>${d}</option>`).join('') + `</select>`;
            if (row.dns2) {
                const sel2 = `<select class="dn-select" onchange="onDnChange('${dn2Key}',this.value)">` +
                    row.dns2.map(d => `<option value="${d}"${d===currentDn2?' selected':''}>${d}</option>`).join('') + `</select>`;
                dnCell = `<div class="dn-pair">${sel1}<span>×</span>${sel2}</div>`;
            } else {
                dnCell = sel1;
            }
        }

        // Цена: по priceKey(dn1,dn2) или статическому priceId
        const priceId = row.priceKey
            ? (row.dns2 ? row.priceKey(currentDn, currentDn2) : row.priceKey(currentDn))
            : (row.priceId || '');
        let price = getPrice(priceId, selectedBrand);
        if (row.pricePer && price) price = +(price / row.pricePer).toFixed(2);
        const cost = +(price * total).toFixed(2);
        if (!isRab) grandTotal += cost;

        const brandLabel = row.brand ? selectedBrand : '';
        const nameText = brandLabel
            ? `${row.name} <span style="color:#6b7280;font-size:0.68rem">${brandLabel}</span>`
            : row.name;

        return `<tr class="${isRab ? 'row-rab' : 'row-mat'}">
            <td class="type-cell">${row.type}</td>
            <td style="text-align:left;white-space:normal;max-width:200px">${nameText}</td>
            <td class="unit-cell">${dnCell}</td>
            <td class="unit-cell">${row.unit}</td>
            ${isRab ? buildings.map(() => '<td></td>').join('') : cells}
            <td class="total-cell">${fmt(total)}</td>
            <td style="color:#9ca3af">${price ? price.toLocaleString('ru-RU') : '—'}</td>
            <td style="color:#10b981;font-weight:600">${cost ? cost.toLocaleString('ru-RU') : '—'}</td>
        </tr>`;
    }).join('');

    // Итого стоимость
    body.innerHTML += `<tr style="border-top:2px solid #3b82f6">
        <td colspan="${4 + buildings.length + 1}"></td>
        <td style="font-weight:700;color:#3b82f6;text-align:center">ИТОГО</td>
        <td style="font-weight:700;color:#10b981">${grandTotal ? grandTotal.toLocaleString('ru-RU') : '—'}</td>
    </tr>`;
}

// === Управление корпусами ===
let nextBuildingId = 5;

function addBuilding() {
    buildings.push({ id: nextBuildingId, name: `№${nextBuildingId}` });
    nextBuildingId++;
    render();
}

function removeBuilding() {
    if (buildings.length <= 1) return;
    buildings.pop();
    render();
}

function resetAll() {
    buildings = [
        { id: 1, name: '№1' },
    ];
    nextBuildingId = 2;
    // Очищаем defaults чтобы поля были пустыми
    for (const key in DEFAULTS) {
        for (const bid in DEFAULTS[key]) {
            DEFAULTS[key][bid] = '';
        }
    }
    localStorage.removeItem(STORAGE_KEY);
    render();
}

// === Вкладки ===
function switchTab(tabId, linkEl) {
    document.getElementById('tab-input').style.display = tabId === 'input' ? '' : 'none';
    document.getElementById('tab-calc').style.display = tabId === 'calc' ? '' : 'none';
    document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
    linkEl.classList.add('active');
    localStorage.setItem('complex_active_tab', tabId);
    recalculate();
}

// === Инициализация ===
loadData();
render();
loadPrices();

// Восстановление активной вкладки
const savedTab = localStorage.getItem('complex_active_tab');
if (savedTab && savedTab !== 'input') {
    const links = document.querySelectorAll('.nav a');
    const idx = savedTab === 'calc' ? 1 : 0;
    switchTab(savedTab, links[idx]);
}
</script>
