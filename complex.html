<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расчёт инженерных систем — Жилой комплекс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0f1117;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.5;
        }

        .header {
            background: #161922;
            border-bottom: 1px solid #2a2d3a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: #3b82f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            font-weight: 700;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f0f0;
        }

        .header span {
            font-size: 0.75rem;
            color: #6b7280;
            margin-left: auto;
        }

        .nav {
            background: #161922;
            border-bottom: 1px solid #2a2d3a;
            padding: 6px 24px;
            display: flex;
            gap: 4px;
        }

        .nav a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.82rem;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav a:hover { color: #e0e0e0; background: #1e2130; }
        .nav a.active { color: #3b82f6; background: #1e2130; }

        .container {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: #161922;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 24px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #3b82f6;
            margin-bottom: 20px;
        }

        .table-scroll {
            overflow-x: auto;
            margin: 0 -8px;
            padding: 0 8px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            min-width: 600px;
        }

        .data-table th,
        .data-table td {
            padding: 4px 6px;
            text-align: center;
            border-bottom: 1px solid #2a2d3a;
            white-space: nowrap;
        }

        .data-table th {
            color: #9ca3af;
            font-weight: 600;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            background: #0f1117;
            position: sticky;
            top: 0;
        }

        .data-table td:first-child,
        .data-table th:first-child {
            text-align: left;
            white-space: normal;
            width: 120px;
            min-width: 90px;
            max-width: 120px;
            color: #d1d5db;
            font-size: 0.76rem;
        }

        .data-table td.unit-cell {
            color: #6b7280;
            font-size: 0.72rem;
        }

        .data-table .total-cell {
            font-weight: 700;
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .data-table .section-row td {
            background: rgba(59, 130, 246, 0.08);
            font-weight: 600;
            color: #3b82f6;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 2px solid #2a2d3a;
        }

        .data-table input {
            width: 64px;
            padding: 3px 4px;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 0.8rem;
            font-family: inherit;
            text-align: center;
            transition: border-color 0.2s;
        }

        .data-table input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .data-table input::placeholder {
            color: #4b5563;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        .result-item {
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .result-item .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 4px;
        }

        .result-item .label {
            font-size: 0.73rem;
            color: #9ca3af;
        }

        .result-item .unit {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn:hover { background: #2563eb; }

        .btn-outline {
            background: transparent;
            border: 1px solid #2a2d3a;
            color: #9ca3af;
        }

        .btn-outline:hover {
            background: #1e2130;
            color: #e0e0e0;
            border-color: #3b82f6;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #2a2d3a;
            color: #9ca3af;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }

        .toolbar-spacer { flex: 1; }

        #tab-input, #tab-calc {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .container { padding: 0 12px; margin: 16px auto; }
            .card { padding: 16px; }
            .results-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">ЖК</div>
    <h1>Инженерные системы — Жилой комплекс</h1>
    <span>Ведомость параметров</span>
</div>

<nav class="nav">
    <a href="#" class="active" onclick="switchTab('input', this); return false;">Исходные данные</a>
    <a href="#" onclick="switchTab('calc', this); return false;">Расчёт</a>
</nav>

<div class="container">
    <!-- === Вкладка: Исходные данные === -->
    <div id="tab-input">
        <div class="toolbar">
            <button class="btn" onclick="addBuilding()">+ Корпус</button>
            <button class="btn-outline btn" onclick="removeBuilding()">− Корпус</button>
            <div class="toolbar-spacer"></div>
            <button class="btn-outline btn" onclick="resetAll()">Сбросить</button>
        </div>

        <div class="card">
            <div class="card-title">Исходные данные по корпусам</div>
            <div class="table-scroll">
                <table class="data-table" id="input-table">
                    <thead id="input-head"></thead>
                    <tbody id="input-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- === Вкладка: Расчёт === -->
    <div id="tab-calc" style="display:none">
        <div class="card">
            <div class="card-title">Расчёт система хоз-быт К1</div>
            <div id="calc-k1-content"></div>
        </div>
    </div>
</div>

<script>
// === Состояние ===
let buildings = [
    { id: 1, name: '№1' },
    { id: 2, name: '№2' },
    { id: 3, name: '№3' },
    { id: 4, name: '№4' },
];

// Параметры ввода
const PARAMS = [
    { id: 'k1',        label: 'Кол-во стояков К1',                                    unit: 'шт', step: 1 },
    { id: 'k2',        label: 'Кол-во стояков К2',                                    unit: 'шт', step: 1 },
    { id: 'k4',        label: 'Кол-во стояков К4',                                    unit: 'шт', step: 1 },
    { id: 'traps',     label: 'Кол-во лотков/трапов на этаже',                        unit: 'шт', step: 1 },
    { id: 'height',    label: 'Высота здания',                                        unit: 'м',  step: 0.1 },
    { id: 'floors',    label: 'Кол-во этажей',                                        unit: 'шт', step: 1 },
    { id: 'floor_h',   label: 'Высота этажа',                                         unit: 'м',  step: 0.1 },
    { id: 'sanitary',  label: 'Кол-во с/у МОП, ПУИ, лапомойки, с/у офис 1 эт',       unit: 'шт', step: 1 },
    { id: 'funnels',   label: 'Кол-во воронок кровельных',                             unit: 'шт', step: 1 },
    { id: 'apartments',label: 'Кол-во КВ (квартир)',                                   unit: 'шт', step: 1 },
];

// Значения по умолчанию из таблицы пользователя { paramId: { buildingId: value } }
const DEFAULTS = {
    k1:        { 1: 18, 2: 19, 3: 8,   4: 8 },
    k2:        { 1: 4,  2: 4,  3: 1,   4: 1 },
    k4:        { 1: 2,  2: 2,  3: '',  4: '' },
    traps:     { 1: 2,  2: 2,  3: '',  4: '' },
    height:    { 1: 96, 2: 96, 3: 24,  4: 20 },
    floors:    { 1: 28, 2: 28, 3: 7,   4: 6 },
    floor_h:   { 1: 3.3,2: 3.3,3: 3.3, 4: 3.3 },
    sanitary:  { 1: 8,  2: 13, 3: 6,   4: 3 },
    funnels:   { 1: 6,  2: 10, 3: 2,   4: 6 },
    apartments:{ 1: '', 2: '', 3: '',  4: '' },
};

// Расчётные строки (пусто — будет заполняться)

// === Утилиты ===
function val(paramId, buildingId) {
    const el = document.getElementById(`inp_${paramId}_${buildingId}`);
    return el ? (parseFloat(el.value) || 0) : 0;
}

function fmt(v) {
    if (v === 0) return '—';
    return v % 1 === 0 ? v.toString() : v.toFixed(1);
}

// === Рендер ===
function render() {
    renderInputTable();
    recalculate();
}

function renderInputTable() {
    const head = document.getElementById('input-head');
    const body = document.getElementById('input-body');

    // Заголовок
    head.innerHTML = `<tr>
        <th style="text-align:left">Система / Корпуса</th>
        <th>Ед. изм.</th>
        ${buildings.map(b => `<th>Корпус ${b.name}</th>`).join('')}
        <th>Итого</th>
    </tr>`;

    // Строки параметров
    body.innerHTML = PARAMS.map(p => `<tr>
        <td>${p.label}</td>
        <td class="unit-cell">${p.unit}</td>
        ${buildings.map(b => {
            const def = (DEFAULTS[p.id] && DEFAULTS[p.id][b.id] !== undefined) ? DEFAULTS[p.id][b.id] : '';
            return `<td><input type="number" id="inp_${p.id}_${b.id}"
                value="${def}" min="0" step="${p.step}"
                placeholder="0" oninput="recalculate()"></td>`;
        }).join('')}
        <td class="total-cell" id="total_${p.id}">—</td>
    </tr>`).join('');

}

function recalculate() {
    // Итого по входным параметрам
    PARAMS.forEach(p => {
        let sum = 0;
        buildings.forEach(b => { sum += val(p.id, b.id); });
        document.getElementById(`total_${p.id}`).textContent = fmt(sum);
    });

    // Расчёт К1
    renderCalcK1();
}

function renderCalcK1() {
    const el = document.getElementById('calc-k1-content');
    const totalK1 = buildings.reduce((s, b) => s + val('k1', b.id), 0);
    const totalLen = buildings.reduce((s, b) => s + val('k1', b.id) * val('height', b.id), 0);

    el.innerHTML = `
        <div class="table-scroll">
            <table class="data-table">
                <thead><tr>
                    <th style="text-align:left">Параметр</th>
                    <th>Ед. изм.</th>
                    ${buildings.map(b => `<th>Корпус ${b.name}</th>`).join('')}
                    <th>Итого</th>
                </tr></thead>
                <tbody>
                    <tr>
                        <td>Стояков К1</td>
                        <td class="unit-cell">шт</td>
                        ${buildings.map(b => `<td>${fmt(val('k1', b.id))}</td>`).join('')}
                        <td class="total-cell">${fmt(totalK1)}</td>
                    </tr>
                    <tr>
                        <td>Высота здания</td>
                        <td class="unit-cell">м</td>
                        ${buildings.map(b => `<td>${fmt(val('height', b.id))}</td>`).join('')}
                        <td class="total-cell">—</td>
                    </tr>
                    <tr>
                        <td>Длина стояков К1</td>
                        <td class="unit-cell">м</td>
                        ${buildings.map(b => `<td>${fmt(val('k1', b.id) * val('height', b.id))}</td>`).join('')}
                        <td class="total-cell">${fmt(totalLen)}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    `;
}

// === Управление корпусами ===
let nextBuildingId = 5;

function addBuilding() {
    buildings.push({ id: nextBuildingId, name: `№${nextBuildingId}` });
    nextBuildingId++;
    render();
}

function removeBuilding() {
    if (buildings.length <= 1) return;
    buildings.pop();
    render();
}

function resetAll() {
    buildings = [
        { id: 1, name: '№1' },
    ];
    nextBuildingId = 2;
    // Очищаем defaults чтобы поля были пустыми
    for (const key in DEFAULTS) {
        for (const bid in DEFAULTS[key]) {
            DEFAULTS[key][bid] = '';
        }
    }
    render();
}

// === Вкладки ===
function switchTab(tabId, linkEl) {
    document.getElementById('tab-input').style.display = tabId === 'input' ? '' : 'none';
    document.getElementById('tab-calc').style.display = tabId === 'calc' ? '' : 'none';
    document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
    linkEl.classList.add('active');
    recalculate();
}

// === Инициализация ===
render();
</script>

</body>
</html>
